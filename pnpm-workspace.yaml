packages:
  - apps/*
  - packages/*

allowBuilds:
  # Pulled in transitively by `inngest` (its OpenTelemetry trace exporter).
  # protobufjs' postinstall only regenerates descriptors that already ship built
  # in the tarball, so denying it changes nothing at runtime — but the decision
  # has to be RECORDED, not left blank: pnpm treats an undecided build script as
  # an error, and `pnpm install --frozen-lockfile` exits 1 with
  # ERR_PNPM_IGNORED_BUILDS, which fails CI at the install step.
  protobufjs: false
  sharp: true

# Single source of truth for versions shared across workspace packages.
# Reference with "catalog:" in package.json files.
catalog:
  react: ^19.2.7
  react-dom: ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@types/node": ^24.0.0
  # TS 7 (native compiler) drops the JS compiler API that next build still
  # requires — revisit once Next.js supports it.
  typescript: ~5.9.3
  zod: ^4.4.3
  vitest: ^4.1.10
  # ICS parsing (Deadlines & Calendar Hub §3.7). Pure JS, zero runtime deps,
  # timezone-aware recurrence expansion — the reason `rrule` was rejected.
  ical.js: ^2.2.1
  "@supabase/supabase-js": ^2.110.6
  "@supabase/ssr": ^0.12.3
  "@phosphor-icons/react": ^2.1.10
  # Component-test stack. Only apps/web runs jsdom; packages/* stay on node.
  jsdom: ^29.1.1
  "@testing-library/react": ^16.3.2
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/user-event": ^14.6.1

minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@4.0.21'
  - '@supabase/auth-js@2.110.6'
  - '@supabase/functions-js@2.110.6'
  - '@supabase/postgrest-js@2.110.6'
  - '@supabase/realtime-js@2.110.6'
  - '@supabase/storage-js@2.110.6'
  - '@supabase/supabase-js@2.110.6'
  - ai@7.0.29
