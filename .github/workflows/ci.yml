name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  # Placeholder values so t3-env validation itself is exercised in CI.
  # Real secrets are only needed at deploy time (Vercel).
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
  SUPABASE_SECRET_KEY: sb_secret_placeholder
  # Access-code gate. Placeholder only — the real code lives in Vercel's env.
  ACCESS_CODE: ci_placeholder_access_code
  # Calendar-sync cron secret. Placeholder only; must clear the 16-char minimum
  # in env.ts or the build fails here rather than in production.
  CRON_SECRET: ci_placeholder_cron_secret_value
  # Inngest signing key. Placeholder only — the real key lives in Vercel's env.
  # Must clear the 32-char minimum in env.ts or the build fails here first,
  # which is the point: `/api/inngest` is gate-exempt and this key is its only
  # authentication. INNGEST_EVENT_KEY is optional in env.ts and stays unset, so
  # CI also proves the app builds without it.
  INNGEST_SIGNING_KEY: signkey-test-ci_placeholder_inngest_signing_key_value
  # AI provider keys (PLAN.md §AI Strategy §1b). Placeholders only — the real keys live in
  # Vercel's env, and `packages/ai` never reads process.env anyway. Both are `.optional()`
  # in env.ts, so these exist to exercise the `.min(1)` validator rather than to satisfy a
  # requirement: a typo'd var name in env.ts fails here instead of in production.
  # ANTHROPIC_API_KEY is deliberately left unset, so CI also proves the app builds with an
  # AI key missing entirely.
  GOOGLE_GENERATIVE_AI_API_KEY: ci_placeholder_google_generative_ai_key
  VOYAGE_API_KEY: ci_placeholder_voyage_key
  CLOUDCONVERT_API_KEY: ci_placeholder_cloudconvert_key
  # The §6 kill switch and budget guard. All three have defaults in env.ts, so
  # they are set here to exercise the validators rather than to satisfy a
  # requirement — a typo'd name or a loosened schema fails CI instead of
  # production. AI_KILL_SWITCH is deliberately given the string "false": it is
  # the value that a truthiness-based parser would misread as ON, so CI proves
  # the enum+transform reads it as OFF. AI_MAX_TIER uses `fast` rather than the
  # `deep` production value so the clamp path is the one CI type-checks.
  AI_KILL_SWITCH: "false"
  AI_MAX_TIER: fast
  AI_MONTHLY_BUDGET_USD: "75"
  # INNGEST_DEV is deliberately NOT set here. env.ts constrains it to
  # 0/1/true/false, and leaving it unset means CI builds in the same cloud mode
  # production runs in — so the signature-verification path is the one exercised.

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:ci

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
